profiles:
  # Shipped WLAN baselines. Ready to use as-is, but adjust them if your
  # environment, client mix, or security policy needs something different.
  # Available presets: general_5g, general_6g, guest_5g, guest_6g, iot
  #
  # Profile field guide:
  # - wifi_bands: expected WLAN bands (2g, 5g, 6g)
  # - security_protocols: allowed security modes for a matching WLAN
  # - fast_roaming, bss_transition, uapsd, proxy_arp, multicast_*,
  #   pmf, hide_wifi_name, client_device_isolation, ap_name_in_beacon:
  #   controller settings compared directly against the WLAN
  # - minrate_*, dtim_*, group_rekey, sae_*:
  #   expected best-practice baseline values for the WLAN
  # - mlo and dtim_6 are only needed for profiles that include 6g

  # High-performance baseline for primary client WLANs on 2.4/5 GHz.
  general_5g:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: true
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
      - WPA2/WPA3 Enterprise
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 10
    sae_sync_time: 5
    bss_transition: true
    uapsd: false
    dtim_24: 1
    dtim_5: 3
    group_rekey: 3600
    ap_name_in_beacon: false

  # High-performance baseline for primary client WLANs with 6 GHz enabled.
  general_6g:
    wifi_bands:
      - 2g
      - 5g
      - 6g
    mlo: false
    fast_roaming: true
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
      - WPA3
      - WPA2/WPA3 Enterprise
      - WPA3 Enterprise
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 10
    sae_sync_time: 5
    bss_transition: true
    uapsd: false
    dtim_24: 1
    dtim_5: 3
    dtim_6: 3
    group_rekey: 3600
    ap_name_in_beacon: false

  # Compatibility-first baseline for legacy and IoT devices, preferably on 2.4 GHz only.
  iot:
    wifi_bands:
      - 2g
    fast_roaming: false
    minrate_24_kbps: 5500
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: false
    security_protocols:
      - WPA2
    pmf: Disabled
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 5
    sae_sync_time: 5
    bss_transition: false
    uapsd: false
    dtim_24: 1
    group_rekey: 7200
    ap_name_in_beacon: false

  # Guest baseline for 2.4/5 GHz with broad compatibility and stronger confidentiality.
  guest_5g:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: true
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: true
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: true
    sae_anti_clogging: 5
    sae_sync_time: 5
    bss_transition: true
    uapsd: false
    dtim_24: 1
    dtim_5: 3
    group_rekey: 3600
    ap_name_in_beacon: false

  # Guest baseline with 6 GHz enabled.
  guest_6g:
    wifi_bands:
      - 2g
      - 5g
      - 6g
    mlo: false
    fast_roaming: true
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: true
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
      - WPA3
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: true
    sae_anti_clogging: 5
    sae_sync_time: 5
    bss_transition: true
    uapsd: false
    dtim_24: 1
    dtim_5: 3
    dtim_6: 3
    group_rekey: 3600
    ap_name_in_beacon: false
